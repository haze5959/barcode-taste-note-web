<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarNote</title>
    <!--
      JS를 실행하지 않는 크롤러(카카오톡, 페이스북, X 등)를 위한 정적 기본 메타태그.
      data-static-seo가 붙은 태그는 앱 부팅 시(main.tsx) 제거되고 react-helmet(SEO 컴포넌트)의 동적 값으로 대체된다.
      문구 출처: locales en(전역 기본 언어)의 common.app_name / app_promo_dialog.desc (수정 시 함께 갱신할 것)
    -->
    <meta data-static-seo name="description" content="From barcode scanning to social sharing, enjoy the full tasting note experience on BarNote." />
    <meta data-static-seo property="og:type" content="website" />
    <meta data-static-seo property="og:site_name" content="BarNote" />
    <meta data-static-seo property="og:title" content="BarNote" />
    <meta data-static-seo property="og:description" content="From barcode scanning to social sharing, enjoy the full tasting note experience on BarNote." />
    <meta data-static-seo property="og:image" content="https://barnote.net/og-image.png" />
    <meta data-static-seo name="twitter:card" content="summary_large_image" />
    <meta data-static-seo name="twitter:title" content="BarNote" />
    <meta data-static-seo name="twitter:description" content="From barcode scanning to social sharing, enjoy the full tasting note experience on BarNote." />
    <meta data-static-seo name="twitter:image" content="https://barnote.net/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
